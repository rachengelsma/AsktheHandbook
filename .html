<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ask the Handbook - PRTS Employee Handbook Assistant</title>
    <script src="https://cdn.botframework.com/botframework-webchat/latest/webchat.js"></script>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #F3F3F4;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            -webkit-overflow-scrolling: touch;
        }

        #webchat-container {
            width: 420px;
            height: 620px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(28, 28, 28, 0.12);
            border: 1px solid #e0e0e0;
            background: white;
            resize: both;
            min-width: 320px;
            min-height: 400px;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        @media (max-width: 768px) {
            body { padding: 0; }
            #webchat-container {
                width: 100vw;
                height: 100vh;
                border-radius: 0;
                border: none;
                resize: none;
                min-height: 100vh;
            }
            #header { position: sticky; top: 0; z-index: 100; }
        }

        #header {
            background-color: #DA2037;
            color: white;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }

        #header-icon {
            width: 36px;
            height: 36px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }

        #header-text h2 {
            margin: 0;
            font-size: 16px;
            font-weight: 600;
        }

        #header-text p {
            margin: 2px 0 0;
            font-size: 12px;
            opacity: 0.85;
        }

        #webchat {
            flex: 1;
            overflow: hidden;
        }
    </style>
</head>
<body>
    <div id="webchat-container">
        <div id="header">
            <div id="header-icon">📖</div>
            <div id="header-text">
                <h2>Ask the Handbook</h2>
                <p>AI Assistant for Staff &amp; Faculty</p>
            </div>
        </div>
        <div id="webchat" role="main"></div>
    </div>

    <script>
        (async function() {
            const styleOptions = {
                accent: '#DA2037',
                botAvatarInitials: 'HB',
                userAvatarInitials: 'You',
                backgroundColor: '#F3F3F4',
                bubbleBackground: '#ffffff',
                bubbleBorderRadius: 12,
                bubbleFromUserBackground: '#DA2037',
                bubbleFromUserTextColor: '#ffffff',
                bubbleFromUserBorderRadius: 12,
                sendBoxBackground: '#ffffff',
                sendBoxBorderTop: '1px solid #e0e0e0',
            };

            const res = await fetch(
                'https://default61d6eb67cbe542ee8a1373c46652bd71.environment.api.powerplatform.com/copilotstudio/dataverse-backed/authenticated/bots/cr2ce_agent/conversations?api-version=2022-03-01-preview',
                { method: 'POST' }
            );
            const { token } = await res.json();

            window.WebChat.renderWebChat(
                {
                    directLine: window.WebChat.createDirectLine({ token }),
                    styleOptions,
                    locale: 'en-US',
                },
                document.getElementById('webchat')
            );
        })();
    </script>
</body>
</html>
